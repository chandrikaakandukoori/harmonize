<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonize – Browser-Based Video Loop Station</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    
    <div id="welcome-screen">
        <div class="welcome-content">
            <h1 id = "app-title">Harmonize.</h1>
            
            <button id="permissionButton">Grant Camera & Mic Access</button>
        </div>
    </div>

     
    <div id="app_name">Harmonize.</div>
    <div id="status">Ready</div>
    <div id="timer">01:30</div>

     
    <main id="workspace">
        
        <div id="videoGrid" class="grid-1-tile">
            <video id="preview" autoplay muted playsinline></video>
            
        </div>
    </main>

     
    <div class="controlBar">
        <button id="playButton" disabled>▶ </button>
        <button id="pauseButton" disabled>⏸ </button>
        <button id="recordButton" disabled>🔴  </button>
        <button id="deleteButton" disabled>🗑  </button>
        <button id="rerecordButton" disabled>🔄  </button>
    </div>

     
    <script src="script.js"></script>

</body>
</html>
