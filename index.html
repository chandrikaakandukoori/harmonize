<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoopStation</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Timer -->
    <div class="timer">
        01:30
    </div>

    <!-- Main Video Area -->
    <div class="videoContainer">

        <div class="videoTile">
            Camera Preview
        </div>

    </div>

    <div>
        <video id="camera-preview" autoplay playsinline muted></video>
    </div>

    <!-- Bottom Control Bar -->
    <div class="controlBar">

        <button id="recordButton">🎥 Record</button>

        <button class="controlButton">▶ Play</button>

        <button class="controlButton">⏸ Pause</button>

        <button class="controlButton">🗑 Delete</button>

        <button class="controlButton">🔄 Re-record</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
