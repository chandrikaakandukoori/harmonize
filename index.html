<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Harmonize</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="app_name">Harmonize.</div>

    <div class="overlay">

    <div id="status">
        Harmonize
    </div>

    <div id="timer">
        Ready
    </div>

    </div>

    <div class="videoContainer">

        <video
            id="camera-preview"
            autoplay
            muted
            playsinline>
        </video>

    </div>

    <div class="controlBar">

        

        <button>▶ Play</button>

        <button>⏸ Pause</button>

        <button id="recordButton">🎥 Record</button>

        <button>🗑 Delete</button>

        <button>🔄 Re-record</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
